<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistindo ✨ PonyVerse</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS EXCLUSIVOS DO PLAYER --- */
        .header-player {
            padding: 2rem;
            display: flex;
            align-items: center;
        }

        /* Forçando o visual do botão voltar para nada do CSS principal atrapalhar */
        .btn-voltar {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6) !important;
            color: white !important;
            padding: 0.6rem 1.3rem !important;
            border-radius: 15px !important;
            font-weight: bold !important;
            font-size: 1.0rem !important;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .btn-voltar:hover {
            background: rgba(255, 255, 255, 0.4) !important;
            border-color: white !important;
            transform: translateX(-5px);
        }

        .player-container {
            max-width: 900px;
            margin: 0 auto 3rem auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .video-wrapper {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(0,0,0,0.03),
                0 10px 30px rgba(0,0,0,0.2);
            transition: box-shadow 0.3s ease;
        }
        
        .video-wrapper:hover {
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(0,0,0,0.03),
                0 15px 40px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
            border-radius: 14px;
        }

        /* Resolvendo o problema do texto invisível! */
        .episode-title {
            font-size: 2rem;
            font-weight: 900;
            color: #4A235A !important; 
            margin-bottom: 0.5rem;
        }

        .episode-synopsis {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a4a4a !important; 
            margin-bottom: 2rem;
        }

        /* ✨ BOTÕES PREMIUM STYLE (Foco apenas no Player) ✨ */
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            border-top: 1px solid rgba(116, 40, 167, 0.08); 
            padding-top: 2rem;
            justify-content: center; 
            max-width: 600px; /* ✨ Limita o tamanho do grupo todo */
            margin: 0 auto;   /* ✨ Centraliza o grupo no card */
        }

        .btn-action {
            /* Fundo escuro premium com borda sutil, igual à referência */
            background: #8f4ac7; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #ffffff !important; 
            
            padding: 0.9rem 2.5rem; 
            border-radius: 8px; /* Cantos levemente arredondados, visual mais profissional */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;      /* Centraliza verticalmente */
            justify-content: center;   /* ✨ Centraliza horizontalmente o conjunto ícone + texto */
    
            padding: 0.8rem 0;        /* ✨ Importante: deixe o segundo valor (lateral) como 0 */
            width: 100%;              /* Garante que o flex: 1 funcione bem */
            max-width: 180px;         /* O tamanho que você escolheu */
    
            gap: 0.5rem;              /* Espaço entre o ícone e o texto */
    
    /* Outros estilos que você já tem */
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        /* O Efeito Mágico no Hover (Fica colorido e brilha ao passar o mouse) */
        .btn-action:hover {
            transform: translateY(-2px);
            color: #ffffff !important;
        }

        /* 💖 Botão Favoritar */
        .btn-action.favorite:hover {
            background: #ff007f; /* Magenta vibrante */
            border-color: #ff007f;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4); 
        }
        
        /* 👁️ Botão Assistido */
        .btn-action.watched:hover {
            background: #6f12bb; /* Roxo */
            border-color: #8c00ff;
            box-shadow: 0 8px 25px rgba(174, 104, 231, 0.4);
        }

        /* 🔗 Botão Compartilhar */
        .btn-action.share:hover {
            background: #4facfe; /* Azul */
            border-color: #4facfe;
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }
    </style>
</head>
<body>

    <header class="header-player">
    <a href="index.html?view=catalogo" class="btn-voltar" style="text-decoration: none;">◀  Voltar para o Catálogo</a>
</header>

    <main class="player-container">
        <div class="video-wrapper">
            <video id="video-player" controls autoplay>
                <source id="video-source" src="" type="video/mp4">
                Seu navegador não suporta o formato de vídeo.
            </video>
        </div>
        
        <div class="episode-details">
            <h1 class="episode-title" id="ep-title">Carregando magia...</h1>
            <p class="episode-synopsis" id="ep-desc">Buscando os detalhes deste episódio...</p>
            
            <div class="action-buttons">
                <button class="btn-action favorite" onclick="alert('Que legal! Este episódio foi favoritado na sua conta. ❤')">❤  Favoritar</button>
                <button class="btn-action watched" onclick="alert('Eba! Episódio marcado como assistido. ☀')">𖦹  Já Assisti</button>
                <button class="btn-action share" onclick="alert('Compartilhar a magia da amizade em breve!')">➤  Compartilhar</button>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const caminhoVideo = urlParams.get('caminho');
        const tituloEpisodio = urlParams.get('titulo');

        document.getElementById('ep-title').textContent = tituloEpisodio;
        document.getElementById('video-source').src = caminhoVideo;
        document.getElementById('video-player').load();

        async function buscarSinopse() {
            try {
                const resposta = await fetch('http://localhost:3000/api/episodios');
                const dados = await resposta.json();
                
                let sinopseEncontrada = "A sinopse deste episódio não foi encontrada.";

                if (dados.temporadas) {
                    for (const temporada of dados.temporadas) {
                        const ep = temporada.episodios.find(e => e.caminho_video === caminhoVideo);
                        if (ep) {
                            sinopseEncontrada = ep.descricao;
                            break;
                        }
                    }
                }
                document.getElementById('ep-desc').textContent = sinopseEncontrada;
            } catch (error) {
                document.getElementById('ep-desc').textContent = "Não foi possível carregar a sinopse no momento.";
            }
        }

        buscarSinopse();
    </script>
</body>
</html>
