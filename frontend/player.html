<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistindo ✨ PonyVerse</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS EXCLUSIVOS DO PLAYER --- */
        .header-player {
            padding: 2rem;
            display: flex;
            align-items: center;
        }

        /* Forçando o visual do botão voltar para nada do CSS principal atrapalhar */
        .btn-voltar {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6) !important;
            color: white !important;
            padding: 0.6rem 1.3rem !important;
            border-radius: 15px !important;
            font-weight: bold !important;
            font-size: 1.0rem !important;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .btn-voltar:hover {
            background: rgba(255, 255, 255, 0.4) !important;
            border-color: white !important;
            transform: translateX(-5px);
        }

        .player-container {
            max-width: 900px;
            margin: 0 auto 3rem auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .video-wrapper {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(0,0,0,0.03),
                0 10px 30px rgba(0,0,0,0.2);
            transition: box-shadow 0.3s ease;
        }
        
        .video-wrapper:hover {
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(0,0,0,0.03),
                0 15px 40px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
            border-radius: 14px;
        }

        /* Resolvendo o problema do texto invisível! */
        .episode-title {
            font-size: 2rem;
            font-weight: 900;
            color: #4A235A !important; 
            margin-bottom: 0.5rem;
        }

        .episode-synopsis {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a4a4a !important; 
            margin-bottom: 2rem;
        }

        /* ✨ BOTÕES PREMIUM STYLE (Foco apenas no Player) ✨ */
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            border-top: 1px solid rgba(116, 40, 167, 0.08); 
            padding-top: 2rem;
            justify-content: center; 
            max-width: 600px; /* ✨ Limita o tamanho do grupo todo */
            margin: 0 auto;   /* ✨ Centraliza o grupo no card */
        }

        .btn-action {
            /* Fundo escuro premium com borda sutil, igual à referência */
            background: #8f4ac7; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #ffffff !important; 
            
            padding: 0.9rem 2.5rem; 
            border-radius: 8px; /* Cantos levemente arredondados, visual mais profissional */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            justify-content: center;   /* ✨ Centraliza horizontalmente o conjunto ícone + texto */
    
            padding: 0.8rem 0;        /* ✨ Importante: deixe o segundo valor (lateral) como 0 */
            width: 100%;              /* Garante que o flex: 1 funcione bem */
            max-width: 180px;         /* O tamanho que você escolheu */
        }
        /* O Efeito Mágico no Hover (Fica colorido e brilha ao passar o mouse) */
        .btn-action:hover {
            transform: translateY(-2px);
            color: #ffffff !important;
        }

        /* 💖 Botão Favoritar */
        .btn-action.favorite:hover {
            background: #ff007f; /* Magenta vibrante */
            border-color: #ff007f;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4); 
        }

        .btn-action.favorite.active {
            background: #ff007f !important;
            border-color: #ff007f !important;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4);
            color: white !important;
        }
        
        /* 👁️ Botão Assistido */
        .btn-action.watched:hover {
            background: #6f12bb; /* Roxo */
            border-color: #8c00ff;
            box-shadow: 0 8px 25px rgba(174, 104, 231, 0.4);
        }

        .btn-action.watched.active {
            background: #6f12bb !important;
            border-color: #8c00ff !important;
            box-shadow: 0 8px 25px rgba(174, 104, 231, 0.4);
            color: white !important;
        }

        /* 🔗 Botão Compartilhar */
        .btn-action.share:hover {
            background: #4facfe; /* Azul */
            border-color: #4facfe;
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }
    </style>
</head>
<body>

    <header class="header-player">
    <a href="index.html?view=catalogo" class="btn-voltar" style="text-decoration: none;">◀ Voltar para o Catálogo</a>
</header>

    <main class="player-container">
        <div class="video-wrapper">
            <video id="video-player" controls autoplay>
                <source id="video-source" src="" type="video/mp4">
                Seu navegador não suporta o formato de vídeo.
            </video>
        </div>
        
        <div class="episode-details">
            <h1 class="episode-title" id="ep-title">Carregando magia...</h1>
            <p class="episode-synopsis" id="ep-desc">Buscando os detalhes deste episódio...</p>
            
            <div class="action-buttons">
                <button class="btn-action favorite" onclick="alternarFavorito()">❤  Favoritar</button>
                <button class="btn-action watched" onclick="alternarAssistido()">𖦹  Já Assisti</button>
                <button class="btn-action share" onclick="abrirCompartilhar()">➤  Compartilhar</button>
            </div>
        </div>
    </main>

<script>
    // 1. Definição Global das variáveis da URL
    const urlParams = new URLSearchParams(window.location.search);
    const epID = urlParams.get('titulo'); 
    const caminhoVideo = urlParams.get('caminho');

    // --- FUNÇÃO BUSCAR SINOPSE ---
    async function buscarSinopse() {
        try {
            const resposta = await fetch('http://localhost:3000/api/episodios');
            const dados = await resposta.json();
            
            let sinopseEncontrada = "A sinopse deste episódio não foi encontrada.";

            if (dados.temporadas) {
                for (const temporada of dados.temporadas) {
                    const ep = temporada.episodios.find(e => e.caminho_video === caminhoVideo);
                    if (ep) {
                        sinopseEncontrada = ep.descricao;
                        break;
                    }
                }
            }
            document.getElementById('ep-desc').textContent = sinopseEncontrada;
        } catch (error) {
            document.getElementById('ep-desc').textContent = "Não foi possível carregar a sinopse no momento.";
        }
    }

    // --- FUNÇÕES DE INTERAÇÃO (Favoritos/Assistidos) ---
    function alternarFavorito() {
        let favoritos = JSON.parse(localStorage.getItem('ponies_favoritos')) || [];
        const btn = document.querySelector('.btn-action.favorite');
        if (favoritos.includes(epID)) {
            favoritos = favoritos.filter(id => id !== epID);
            btn.innerHTML = "❤  Favoritar";
            btn.classList.remove('active');
        } else {
            favoritos.push(epID);
            btn.innerHTML = "❤︎  Na Minha Lista";
            btn.classList.add('active');
        }
        localStorage.setItem('ponies_favoritos', JSON.stringify(favoritos));
    }

    function alternarAssistido() {
        let assistidos = JSON.parse(localStorage.getItem('ponies_assistidos')) || [];
        const btn = document.querySelector('.btn-action.watched');
        if (assistidos.includes(epID)) {
            assistidos = assistidos.filter(id => id !== epID);
            btn.innerHTML = "𖦹  Já Assisti";
            btn.classList.remove('active');
        } else {
            assistidos.push(epID);
            btn.innerHTML = "✔  Assistido";
            btn.classList.add('active');
        }
        localStorage.setItem('ponies_assistidos', JSON.stringify(assistidos));
    }

    function abrirCompartilhar() {
        alert(`Partilhando: "${epID}"\nA Comunidade PonyVerse está quase a chegar!`);
    }

    // ✨ INICIALIZAÇÃO CORRIGIDA ✨
    window.addEventListener('load', function() {
        const videoPlayer = document.getElementById('video-player');
        const titleElement = document.getElementById('ep-title');

        if (epID) titleElement.textContent = epID;

        if (caminhoVideo) {
            // ✨ A MÁGICA ACONTECE AQUI ✨
            let caminhoCorrigido = caminhoVideo;
            
            // Forçamos o navegador a buscar o vídeo no servidor Node (3000)
            if (caminhoVideo.startsWith('/media')) {
                caminhoCorrigido = "http://localhost:3000" + caminhoVideo;
            } else if (caminhoVideo.startsWith('media')) {
                caminhoCorrigido = "http://localhost:3000/" + caminhoVideo;
            }

            console.log("Tentando carregar o vídeo de:", caminhoCorrigido); // Para checarmos se deu certo

            videoPlayer.src = caminhoCorrigido; 
            videoPlayer.load(); 
        }

        // Verifica estados salvos (Favoritos/Assistidos)
        const favoritos = JSON.parse(localStorage.getItem('ponies_favoritos')) || [];
        const assistidos = JSON.parse(localStorage.getItem('ponies_assistidos')) || [];

        if (favoritos.includes(epID)) {
            const btn = document.querySelector('.btn-action.favorite');
            btn.innerHTML = "❤︎  Na Minha Lista";
            btn.classList.add('active');
        }
        if (assistidos.includes(epID)) {
            const btn = document.querySelector('.btn-action.watched');
            btn.innerHTML = "✔  Assistido";
            btn.classList.add('active');
        }
        
        buscarSinopse(); 
    });
</script>
</body>
</html>
