<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistindo 🦄</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para a tela de vídeo */
        .player-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
            background: var(--branco-vidro);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        video {
            width: 100%;
            border-radius: 10px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background-color: #000;
        }

        .btn-voltar {
            margin-bottom: 1rem;
            align-self: flex-start;
            background: var(--pinkie-pink);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-voltar:hover {
            background: #ff7e84;
        }
    </style>
</head>
<body>
    <main class="player-container">
        <a href="index.html" class="btn-voltar">← Voltar para o Catálogo</a>
        <h2 id="titulo-video" style="margin-bottom: 1rem; color: var(--twilight-purple);">Carregando episódio...</h2>
        
        <video id="video-player" controls autoplay>
            Seu navegador não suporta o elemento de vídeo.
        </video>
    </main>

    <script>
        // Pega os parâmetros da URL (ex: player.html?caminho=/media/...&titulo=NomeDoEp)
        const parametros = new URLSearchParams(window.location.search);
        const caminhoVideo = parametros.get('caminho');
        const titulo = parametros.get('titulo');

        if (caminhoVideo) {
            document.getElementById('titulo-video').textContent = titulo || "Assistindo Episódio";
            const videoPlayer = document.getElementById('video-player');
            
            // Aponta a fonte do vídeo para a nossa nova rota no backend!
            videoPlayer.src = `http://localhost:3000/api/video?caminho=${encodeURIComponent(caminhoVideo)}`;
        } else {
            document.getElementById('titulo-video').textContent = "Erro: Magia de vídeo não encontrada.";
        }
    </script>
</body>
</html>
