<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistindo ✨ PonyVerse</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS EXCLUSIVOS DO PLAYER --- */
        .header-player {
            padding: 2rem;
            display: flex;
            align-items: center;
        }

        /* Forçando o visual do botão voltar para nada do CSS principal atrapalhar */
        .btn-voltar {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6) !important;
            color: white !important;
            padding: 0.6rem 1.3rem !important;
            border-radius: 15px !important;
            font-weight: bold !important;
            font-size: 1.0rem !important;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .btn-voltar:hover {
            background: rgba(255, 255, 255, 0.4) !important;
            border-color: white !important;
            transform: translateX(-5px);
        }

        .player-container {
            max-width: 900px;
            margin: 0 auto 3rem auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .video-wrapper {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(0,0,0,0.03),
                0 10px 30px rgba(0,0,0,0.2);
            transition: box-shadow 0.3s ease;
        }
        
        .video-wrapper:hover {
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(0,0,0,0.03),
                0 15px 40px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
            border-radius: 14px;
        }

        /* Resolvendo o problema do texto invisível! */
        .episode-title {
            font-size: 2rem;
            font-weight: 900;
            color: #4A235A !important; 
            margin-bottom: 0.5rem;
        }

        .episode-synopsis {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a4a4a !important; 
            margin-bottom: 2rem;
        }

        .action-buttons {
            display: flex;
            gap: 3.5rem; /* Espaço entre os botões */
            border-top: 1px solid rgba(116, 40, 167, 0.08); 
            padding-top: 2rem;
            justify-content: center; 
            align-items: flex-end; 
            max-width: 800px; /* Largura máxima para dar espaço */
            margin: 0 auto;  
        }

        .btn-action {
            /* Fundo escuro premium com borda sutil, igual à referência */
            background: #8f4ac7; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #ffffff !important; 
            
            padding: 0.9rem 2.5rem; 
            border-radius: 8px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            justify-content: center;  
    
            padding: 0.8rem 0;        
            width: 100%;              
            max-width: 180px;         
        }
        /* O Efeito Mágico no Hover (Fica colorido e brilha ao passar o mouse) */
        .btn-action:hover {
            transform: translateY(-2px);
            color: #ffffff !important;
        }

    </style>
</head>
<body>

    <div id="popup-favorito" class="popup-magico">
        <span class="icone-popup">❤︎</span>
        Este episódio agora está na sua lista de favoritos!
    </div>

    <div id="popup-assistido" class="popup-magico">
        <span class="icone-popup">☀</span>
        Este episódio foi marcado como assistido!
    </div>

    <div id="popup-compartilhar" class="popup-magico">
        <span class="icone-popup">✉</span>
        Link do episódio copiado para compartilhar!
    </div>

    <header class="header-player">
    <a href="index.html?view=catalogo" class="btn-voltar" style="text-decoration: none;">Voltar para o Catálogo</a>
</header>

    <main class="player-container">
        <div class="video-wrapper">
            <video id="video-player" controls autoplay>
                <source id="video-source" src="" type="video/mp4">
                Seu navegador não suporta o formato de vídeo.
            </video>
        </div>
        
        <div class="episode-details">
            <h1 class="episode-title" id="ep-title">Carregando magia...</h1>
            <p class="episode-synopsis" id="ep-desc">Buscando os detalhes deste episódio...</p>
            
            <div class="action-buttons">
                <a href="javascript:void(0)" class="btn-imagem-solta" onclick="alternarFavorito()">
                    <img src="fluttershy-fav-2.png" id="img-favorito" class="fav-off" alt="Favoritar">
                    <span class="texto-btn-img" id="texto-favorito">Favoritar</span>
                </a>
    
                <a href="javascript:void(0)" class="btn-imagem-solta" onclick="alternarAssistido()">
                    <img src="pinkie-assistido-off.png" id="img-assistido" class="ast-off" alt="Assistido">
                    <span class="texto-btn-img" id="texto-assistido">Marcar Assistido</span>
                </a>
    
                <a href="javascript:void(0)" class="btn-imagem-solta" onclick="alternarCompartilhar()">
                    <img src="mlp-compartilhar.png" id="img-compartilhar" class="comp-off" alt="Compartilhar">
                    <span class="texto-btn-img" id="texto-compartilhar">Compartilhar</span>
                </a>
            </div>
        </div>
    </main>

<script>
    // 1. Definição Global das variáveis da URL
    const urlParams = new URLSearchParams(window.location.search);
    const epID = urlParams.get('titulo'); 
    const caminhoVideo = urlParams.get('caminho');

    // --- FUNÇÃO BUSCAR SINOPSE ---
    async function buscarSinopse() {
        try {
            const resposta = await fetch('http://localhost:3000/api/episodios');
            const dados = await resposta.json();
            
            let sinopseEncontrada = "A sinopse deste episódio não foi encontrada.";

            if (dados.temporadas) {
                for (const temporada of dados.temporadas) {
                    const ep = temporada.episodios.find(e => e.caminho_video === caminhoVideo);
                    if (ep) {
                        sinopseEncontrada = ep.descricao;
                        break;
                    }
                }
            }
            document.getElementById('ep-desc').textContent = sinopseEncontrada;
        } catch (error) {
            document.getElementById('ep-desc').textContent = "Não foi possível carregar a sinopse no momento.";
        }
    }

    // ✨ FUNÇÕES DE MOSTRAR POPUPS ✨
    function mostrarPopupFavorito() {
        const popup = document.getElementById('popup-favorito');
        popup.classList.add('mostrar');
        setTimeout(() => { popup.classList.remove('mostrar'); }, 3000);
    }

    function mostrarPopupAssistido() {
        const popup = document.getElementById('popup-assistido');
        popup.classList.add('mostrar');
        setTimeout(() => { popup.classList.remove('mostrar'); }, 3000);
    }

    // Novo Popup de Compartilhar
    function mostrarPopupCompartilhar() {
        const popup = document.getElementById('popup-compartilhar');
        popup.classList.add('mostrar');
        setTimeout(() => { popup.classList.remove('mostrar'); }, 3000);
    }


    // --- FUNÇÕES DE INTERAÇÃO (Favoritos/Assistidos/Compartilhar) ---
    function alternarFavorito() {
        let favoritos = JSON.parse(localStorage.getItem('ponies_favoritos')) || [];
        const imgFav = document.getElementById('img-favorito');
        const textoFav = document.getElementById('texto-favorito'); 
        
        if (favoritos.includes(epID)) {
            favoritos = favoritos.filter(id => id !== epID);
            imgFav.src = "fluttershy-fav-2.png"; // Imagem desligada
            imgFav.className = "fav-off"; 
            if(textoFav) {
                textoFav.textContent = "Favoritar"; // Volta o texto
                textoFav.classList.remove('texto-brilhando'); // Remove o brilho
            }
        } else {
            favoritos.push(epID);
            imgFav.src = "fluttershy-fav-on.png"; // Imagem ligada
            imgFav.className = "fav-on"; 
            if(textoFav) {
                textoFav.textContent = "Favoritado  ❤︎"; // Muda o texto
                textoFav.classList.add('texto-brilhando'); // Adiciona brilho
            }
            mostrarPopupFavorito(); // Chama o Popup
        }
        localStorage.setItem('ponies_favoritos', JSON.stringify(favoritos));
    }

    function alternarAssistido() {
        let assistidos = JSON.parse(localStorage.getItem('ponies_assistidos')) || [];
        const imgAssistido = document.getElementById('img-assistido');
        const textoAssistido = document.getElementById('texto-assistido');
        
        if (assistidos.includes(epID)) {
            assistidos = assistidos.filter(id => id !== epID);
            imgAssistido.src = "pinkie-assistido-off.png"; // Imagem desligada
            imgAssistido.className = "ast-off";
            if(textoAssistido) {
                textoAssistido.textContent = "Marcar Assistido"; // Volta o texto
                textoAssistido.classList.remove('texto-brilhando'); // Remove o brilho
            }
        } else {
            assistidos.push(epID);
            imgAssistido.src = "pinkie-assistido-on.png"; // Imagem ligada
            imgAssistido.className = "ast-on";
            if(textoAssistido) {
                textoAssistido.textContent = "Assistido  ▶︎"; // Muda o texto
                textoAssistido.classList.add('texto-brilhando'); // Adiciona brilho
            }
            mostrarPopupAssistido(); // Chama o Popup
        }
        localStorage.setItem('ponies_assistidos', JSON.stringify(assistidos));
    }

    // ✨ NOVA FUNÇÃO DE COMPARTILHAR ✨
    // (Esta função não salva no LocalStorage porque compartilhar é uma ação única, não um "estado" do episódio)
    function alternarCompartilhar() {
        const imgCompartilhar = document.getElementById('img-compartilhar');
        const textoCompartilhar = document.getElementById('texto-compartilhar');
        
        // Muda para o estado "ligado" (Compartilhado)
        imgCompartilhar.src = "mlp-compartilhado.png"; 
        imgCompartilhar.className = "comp-on";
        if(textoCompartilhar) {
            textoCompartilhar.textContent = "Compartilhado  ✔︎";
            textoCompartilhar.classList.add('texto-brilhando');
        }
        
        mostrarPopupCompartilhar(); // Mostra o aviso que o link foi copiado
        
        // Simula a cópia da URL do episódio para a área de transferência do usuário
        navigator.clipboard.writeText(window.location.href).catch(err => {
            console.log('Falha ao copiar o link', err);
        });

        // Opcional: Volta ao estado normal depois de 4 segundos
        setTimeout(() => {
            imgCompartilhar.src = "mlp-compartilhar.png"; 
            imgCompartilhar.className = "comp-off";
            if(textoCompartilhar) {
                textoCompartilhar.textContent = "Compartilhar";
                textoCompartilhar.classList.remove('texto-brilhando');
            }
        }, 4000);
    }


    // ✨ INICIALIZAÇÃO CORRIGIDA ✨
    window.addEventListener('load', function() {
        const videoPlayer = document.getElementById('video-player');
        const titleElement = document.getElementById('ep-title');

        if (epID) titleElement.textContent = epID;

        if (caminhoVideo) {
            let caminhoCorrigido = caminhoVideo;
            
            if (caminhoVideo.startsWith('/media')) {
                caminhoCorrigido = "http://localhost:3000" + caminhoVideo;
            } else if (caminhoVideo.startsWith('media')) {
                caminhoCorrigido = "http://localhost:3000/" + caminhoVideo;
            }

            console.log("Tentando carregar o vídeo de:", caminhoCorrigido);

            videoPlayer.src = caminhoCorrigido; 
            videoPlayer.load(); 
        }

        // Verifica estados salvos (Favoritos/Assistidos)
        const favoritos = JSON.parse(localStorage.getItem('ponies_favoritos')) || [];
        const assistidos = JSON.parse(localStorage.getItem('ponies_assistidos')) || [];

        // Inicialização Favorito
        const imgFav = document.getElementById('img-favorito');
        const textoFav = document.getElementById('texto-favorito');
        
        if (favoritos.includes(epID)) {
            imgFav.src = "fluttershy-fav-on.png"; 
            imgFav.className = "fav-on"; 
            if(textoFav) {
                textoFav.textContent = "Favoritado  ❤︎";
                textoFav.classList.add('texto-brilhando');
            }
        } else {
            imgFav.src = "fluttershy-fav-2.png"; 
            imgFav.className = "fav-off";
            if(textoFav) {
                textoFav.textContent = "Favoritar";
                textoFav.classList.remove('texto-brilhando');
            }
        }

        // Inicialização Assistido
        const imgAssistido = document.getElementById('img-assistido');
        const textoAssistido = document.getElementById('texto-assistido');
        
        if (assistidos.includes(epID)) {
            imgAssistido.src = "pinkie-assistido-on.png";
            imgAssistido.className = "ast-on";
            if(textoAssistido) {
                textoAssistido.textContent = "Assistido  ▶︎";
                textoAssistido.classList.add('texto-brilhando');
            }
        } else {
            imgAssistido.src = "pinkie-assistido-off.png";
            imgAssistido.className = "ast-off";
            if(textoAssistido) {
                textoAssistido.textContent = "Marcar Assistido";
                textoAssistido.classList.remove('texto-brilhando');
            }
        }

        buscarSinopse(); 
    });
</script>
</body>
</html>
