<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Corner ✨ Crie seu Pônei</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS DO JOGO MAGIC CORNER --- */
        .header-magic { padding: 2rem; display: flex; align-items: center; gap: 2rem; }
        .titulo-magic { color: white; font-size: 2.5rem; margin: 0; text-shadow: 0 4px 15px rgba(255, 0, 127, 0.5); }

        .criador-container {
            display: flex; gap: 2rem; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px; padding: 2rem; max-width: 1100px; margin: 0 auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); height: 600px; /* Altura fixa pro menu poder rolar */
        }

        /* ✨ O PÔNEI ✨ */
        .preview-ponei {
            position: relative; width: 450px; height: 100%;
            background-color: rgba(255, 255, 255, 0.9); border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1); border: 4px solid #ff9aff;
            overflow: hidden; flex-shrink: 0;
        }

        /* Ordem das camadas é crucial (A asa de trás tem que ficar atrás do corpo!) */
        .preview-ponei img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; transition: opacity 0.2s ease;
        }

        /* ✨ O MENU DE ABAS ✨ */
        .painel-opcoes {
            flex: 1; display: flex; flex-direction: column;
            background: rgba(0,0,0,0.2); border-radius: 20px; padding: 1.5rem;
            overflow: hidden;
        }

        .abas-menu {
            display: flex; gap: 0.5rem; border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 1rem; margin-bottom: 1.5rem; overflow-x: auto;
        }

        .btn-aba {
            background: rgba(255,255,255,0.1); color: white; border: none;
            padding: 0.8rem 1.2rem; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.3s; white-space: nowrap;
        }

        .btn-aba.ativa, .btn-aba:hover { background: #ff9aff; color: #4A235A; }

        /* ✨ A GRADE DE MINIATURAS ✨ */
        .conteudo-aba {
            display: none; /* Esconde todas as abas por padrão */
            flex-wrap: wrap; gap: 1rem; overflow-y: auto; padding-right: 10px;
            align-content: flex-start;
        }
        .conteudo-aba.ativa { display: flex; /* Mostra a aba clicada */ }

        /* Estilo das caixinhas com imagens pra clicar */
        .item-escolha {
            width: 80px; height: 80px; background: white; border-radius: 15px;
            border: 3px solid transparent; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); overflow: hidden;
        }
        .item-escolha:hover { transform: scale(1.1); border-color: #ff9aff; }
        
        /* A imagenzinha dentro do quadrado de escolha */
        .item-escolha img { width: 90%; height: 90%; object-fit: contain; }

        /* Estilos do Scrollbar para ficar bonitinho */
        .conteudo-aba::-webkit-scrollbar { width: 8px; }
        .conteudo-aba::-webkit-scrollbar-thumb { background: #ff9aff; border-radius: 10px; }

        .acoes-finais { margin-top: 1.5rem; display: flex; justify-content: flex-end; }
        .btn-salvar {
            background: linear-gradient(135deg, #ff007f, #9b59b6); color: white;
            border: none; padding: 1rem 2rem; border-radius: 15px; font-size: 1.1rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

    <header class="header-magic">
        <a href="index.html" class="btn-icone" style="text-decoration: none;">◀ Voltar para o Início</a>
        <h2 class="titulo-magic">Magic Corner 🪄</h2>
    </header>

    <main class="criador-container">
        
        <div class="preview-ponei">
            <img id="camada-asa-tras" src="vazio.png" style="z-index: 1; display: none;"> <img id="camada-rabo" src="rabo-base.png" style="z-index: 2;">
            <img id="camada-corpo" src="corpo-base.png" style="z-index: 3;">
            <img id="camada-marca" src="marca-base.png" style="z-index: 4;">
            <img id="camada-olhos" src="olhos-base.png" style="z-index: 5;">
            <img id="camada-asa-frente" src="vazio.png" style="z-index: 6; display: none;"> <img id="camada-chifre" src="vazio.png" style="z-index: 7; display: none;">
            <img id="camada-crina" src="crina-base.png" style="z-index: 8;">
            <img id="camada-acessorio" src="vazio.png" style="z-index: 9; display: none;">
        </div>

        <div class="painel-opcoes">
            
            <div class="abas-menu">
                <button class="btn-aba ativa" onclick="abrirAba(event, 'aba-tipo')">Raça/Tipo</button>
                <button class="btn-aba" onclick="abrirAba(event, 'aba-corpo')">Corpo</button>
                <button class="btn-aba" onclick="abrirAba(event, 'aba-crina')">Crinas</button>
                <button class="btn-aba" onclick="abrirAba(event, 'aba-olhos')">Olhos</button>
                <button class="btn-aba" onclick="abrirAba(event, 'aba-marcas')">Cutie Marks</button>
            </div>

            <div id="aba-tipo" class="conteudo-aba ativa">
                <div class="item-escolha" title="Terrestre" onclick="mudarRaca('terrestre')">
                    <img src="icone-maca.png" alt="Terrestre">
                </div>
                <div class="item-escolha" title="Pegasus" onclick="mudarRaca('pegasus', 'asa-frente.png', 'asa-tras.png')">
                    <img src="icone-asa.png" alt="Pegasus">
                </div>
                <div class="item-escolha" title="Unicórnio" onclick="mudarRaca('unicornio', 'chifre-base.png')">
                    <img src="icone-chifre.png" alt="Unicórnio">
                </div>
                <div class="item-escolha" title="Alicórnio" onclick="mudarRaca('alicornio', 'asa-frente.png', 'asa-tras.png', 'chifre-base.png')">
                    <img src="icone-coroa.png" alt="Alicórnio">
                </div>
            </div>

            <div id="aba-corpo" class="conteudo-aba">
                <div class="item-escolha" onclick="mudarPeca('camada-corpo', 'corpo-rosa.png')">
                    <img src="preview-rosa.png" alt="Corpo Rosa">
                </div>
                <div class="item-escolha" onclick="mudarPeca('camada-corpo', 'corpo-azul.png')">
                    <img src="preview-azul.png" alt="Corpo Azul">
                </div>
                <div class="item-escolha" onclick="mudarPeca('camada-corpo', 'corpo-amarelo.png')">
                    <img src="preview-amarelo.png" alt="Corpo Amarelo">
                </div>
                </div>

            <div id="aba-crina" class="conteudo-aba">
                <div class="item-escolha" onclick="mudarPeca('camada-crina', 'crina-twilight.png')">
                    <img src="preview-crina-twilight.png">
                </div>
                <div class="item-escolha" onclick="mudarPeca('camada-crina', 'crina-pinkie.png')">
                    <img src="preview-crina-pinkie.png">
                </div>
            </div>

            <div id="aba-olhos" class="conteudo-aba">
                <p style="color: white;">Coloque as opções de olhos aqui!</p>
            </div>
            <div id="aba-marcas" class="conteudo-aba">
                <p style="color: white;">Coloque as Cutie Marks aqui!</p>
            </div>

            <div class="acoes-finais">
                <button class="btn-salvar" onclick="alert('Em breve você fará o download da imagem final!')">Concluir 📸</button>
            </div>

        </div>
    </main>

    <script>
        // 1. SISTEMA DE ABAS (Esconde todas e mostra a selecionada)
        function abrirAba(evento, nomeAba) {
            // Esconde todo mundo
            const conteudos = document.getElementsByClassName("conteudo-aba");
            for (let i = 0; i < conteudos.length; i++) {
                conteudos[i].style.display = "none";
            }
            // Tira a cor "ativa" dos botões
            const botoes = document.getElementsByClassName("btn-aba");
            for (let i = 0; i < botoes.length; i++) {
                botoes[i].classList.remove("ativa");
            }
            // Mostra a aba que foi clicada
            document.getElementById(nomeAba).style.display = "flex";
            evento.currentTarget.classList.add("ativa");
        }

        // 2. TROCA DE PEÇA SIMPLES (Ex: Cabelo, Olho, Corpo)
        function mudarPeca(idDaCamada, nomeDaNovaImagem) {
            const imagem = document.getElementById(idDaCamada);
            if(imagem) {
                imagem.src = nomeDaNovaImagem;
                imagem.style.display = "block"; // Garante que fique visível
            }
        }

        // 3. LÓGICA DE RAÇA (Liga e desliga asas e chifres)
        function mudarRaca(tipo, asaFrenteSrc, asaTrasSrc, chifreSrc) {
            const chifre = document.getElementById('camada-chifre');
            const asaF = document.getElementById('camada-asa-frente');
            const asaT = document.getElementById('camada-asa-tras');

            // Esconde tudo primeiro
            chifre.style.display = 'none';
            asaF.style.display = 'none';
            asaT.style.display = 'none';

            // Liga dependendo da raça
            if(tipo === 'unicornio' || tipo === 'alicornio') {
                chifre.src = chifreSrc;
                chifre.style.display = 'block';
            }
            if(tipo === 'pegasus' || tipo === 'alicornio') {
                asaF.src = asaFrenteSrc;
                asaT.src = asaTrasSrc;
                asaF.style.display = 'block';
                asaT.style.display = 'block';
            }
        }
    </script>
</body>
</html>
