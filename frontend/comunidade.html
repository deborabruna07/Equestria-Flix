<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade - PonyVerse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="comunidade-premium">

    <div class="top-bar" style="position: absolute; top: 30px; left: 50px; right: 50px; z-index: 100; margin-bottom: 0;">
        
        <a href="index.html" class="btn-icone" style="text-decoration: none;">Início</a>
        
        <div class="top-icons">
            <a href="#" class="icon-notification" aria-label="Notificações">
                <img src="sino-icon.png" alt="Notificações" id="notif-bell" style="height: 48px; width: auto;">
            </a>
            
            <a href="#" class="btn-icone" style="text-decoration: none;">Meu Perfil</a>
        </div>
        
    </div>
    </div>

    <div class="comunidade-container">
        
        <header class="hero-comunidade">
            <div style="z-index: 2; margin-top: 40px; margin-bottom: 40px; display: flex; align-items: center; gap: 25px;">
                
                <div class="icone-balao-coracao" style="margin-bottom: 0;">
                    <i class="fa-solid fa-heart"></i>
                </div>
                
                <div style="display: flex; flex-direction: column;">
                    <h1 style="margin-bottom: 5px; display: block;">Comunidade</h1>
                    <p style="margin: 0; max-width: 400px;">Conecte-se com outros fãs, compartilhe sua paixão e faça novas amizades!</p>
                </div>

            </div>
            
            <div class="poneis-header-container">
                <img src="poneis-header.png" alt="Pôneis">
            </div>
        </header>

        <div class="layout-comunidade">
            
            <main>
                <nav class="nav-pilulas">
                    <button class="pilula active"><i class="fa-solid fa-comment-dots"></i> Feed</button>
                    <button class="pilula" onclick="avisarEmBreve('Grupos')"><i class="fa-solid fa-users"></i> Grupos</button>
                    <button class="pilula" onclick="avisarEmBreve('Eventos')"><i class="fa-regular fa-calendar"></i> Eventos</button>
                    <button class="pilula" onclick="avisarEmBreve('Discussões')"><i class="fa-solid fa-comments"></i> Discussões</button>
                    <button class="pilula" onclick="avisarEmBreve('Amigos')"><i class="fa-solid fa-heart"></i> Amigos</button>
                </nav>

                <div class="glass-panel caixa-postagem">
                    <img src="https://ui-avatars.com/api/?name=Twilight+Sparkle&background=c756a7&color=fff" alt="Avatar" class="avatar-comunidade">
                    
                    <div class="area-input">
                        <textarea id="texto-post" placeholder="No que você está pensando, fã de Pony?" rows="2"></textarea>
                        
                        <div id="preview-container" style="display: none; position: relative; margin-top: 10px; margin-bottom: 10px;">
                            <img id="img-preview" src="" style="max-width: 100%; border-radius: 15px; max-height: 300px; object-fit: cover;">
                            <button onclick="removerPreview()" class="btn-fechar-preview"><i class="fa-solid fa-xmark"></i></button>
                        </div>

                        <div class="acoes-postagem">
                            <div class="icones-acao">
                                <input type="file" id="input-imagem" accept="image/*" style="display: none;" onchange="previewImagem(event)">
                                <span onclick="document.getElementById('input-imagem').click()">
                                    <i class="fa-solid fa-image" style="color: #82b1ff;"></i> Imagem
                                </span>
                                <span onclick="avisarEmBreve('Sentimentos')">
                                    <i class="fa-solid fa-face-smile" style="color: #ffd54f;"></i> Sentimento
                                </span>
                                <span onclick="avisarEmBreve('Eventos')">
                                    <i class="fa-regular fa-calendar" style="color: #ffb74d;"></i> Evento
                                </span>
                            </div>
                            <button onclick="enviarPost()" class="btn-publicar-ref">Publicar</button>
                        </div>
                    </div>
                </div>

                <div id="lista-de-posts"></div>
            </main>

            <aside>
                <div class="glass-panel widget-premium">
                    <h3 class="widget-titulo"><i class="fa-solid fa-user-group" style="color:#ff80ff;"></i> Grupos em Destaque</h3>
                    
                    <div class="grupo-item">
                        <img src="https://ui-avatars.com/api/?name=AE&background=ffd166&color=fff" class="grupo-icone" alt="Grupo">
                        <div class="grupo-info">
                            <strong>Amigos de Equestria</strong>
                            <span>1.245 membros</span>
                        </div>
                        <button class="btn-ver-grupo" onclick="avisarEmBreve('Ver grupo')">Ver grupo</button>
                    </div>

                    <div class="grupo-item">
                        <img src="https://ui-avatars.com/api/?name=AM&background=ffb74d&color=fff" class="grupo-icone" alt="Grupo">
                        <div class="grupo-info">
                            <strong>Aventuras & Missões</strong>
                            <span>892 membros</span>
                        </div>
                        <button class="btn-ver-grupo" onclick="avisarEmBreve('Ver grupo')">Ver grupo</button>
                    </div>

                    <div class="grupo-item">
                        <img src="https://ui-avatars.com/api/?name=CA&background=4fc3f7&color=fff" class="grupo-icone" alt="Grupo">
                        <div class="grupo-info">
                            <strong>Clube das Artes</strong>
                            <span>567 membros</span>
                        </div>
                        <button class="btn-ver-grupo" onclick="avisarEmBreve('Ver grupo')">Ver grupo</button>
                    </div>

                    <button class="btn-ver-todos">Ver todos os grupos</button>
                </div>
            </aside>
        </div>
    </div>

    <audio id="musica-fundo" loop autoplay>
        <source src="tema-ponyverse.mp3" type="audio/mpeg">
    </audio>

    <button id="btn-musica" class="btn-musica-flutuante" onclick="toggleMusica()">
        <img src="som-ligado.png" alt="Som" id="icone-som-img">
    </button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="comunidade.js"></script>
</body>
</html>
</body>
</html>
